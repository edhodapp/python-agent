name: Fuzz
on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_fuzz.py --hypothesis-profile=ci -v
