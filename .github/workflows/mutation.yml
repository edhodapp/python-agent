name: Mutation
on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  mutmut:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - coding_agent
          - planning_agent
          - discovery_agent
          - divergence_agent
          - convergence_agent
          - ontology
          - dag_utils
          - dag_integrity
          - tool_guard
          - call_graph
          - rules
          - types
    name: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" "mutmut<3"
      - name: mutmut ${{ matrix.module }}
        run: |
          mutmut run \
            --paths-to-mutate=src/python_agent/${{ matrix.module }}.py \
            --runner="python -m pytest" \
            || true
          mutmut results
